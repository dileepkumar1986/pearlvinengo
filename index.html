<!DOCTYPE html>
<html>
<head>
<title>PEARLVINE SOCIAL FOUNDATION</title>
<link rel="stylesheet" href="style.css">

      <style>
      

        /* Box */
        .content-box1 {
            max-width: 1000px;
            display: flex;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Slider */
        .slider1 {
            width: 50%;
            position: relative;
        }

        .slide1 {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

            .slide1 img {
                width: 100%;
                height: 320px;
                object-fit: cover;
            }

        /* Active */
        .active {
            opacity: 1;
            position: relative;
        }

        /* Content */
        .content {
            width: 50%;
            padding: 25px;
        }

        /* Hide all content */
        .text-slide {
            display: none;
            animation: fadeIn 1s;
        }

        .text-active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #27ae60;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }

        /* Nav */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        /* Responsive */
        @media(max-width:768px) {
            .content-box {
                flex-direction: column;
            }

            .slider1, .content {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Header Load -->
    <div id="header"></div>
    <!-- Slider Load -->
    <div id="slider"></div>
<!-- Slider -->


<div class="container">
<h2>Welcome</h2>
<p>We work for social development.</p>
</div>
<div class="donation-box">
    <h2>🙏 Support Our NGO</h2>
    
    <p>
       Your small contribution can change someone's life.
Please scan the QR code below to make a donation.
    </p>

    <div class="qr-code">
        <!-- Yaha apna QR Code image path daalein -->
        <img src="images/qrcode.png" alt="Scan to Donate">
    </div>
</div>
    <div class="donate">
Pearlvine
</div>


    <script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);
fetch("slider.html")
.then(res => res.text())
.then(data => document.getElementById("slider").innerHTML = data);

    </script>
<script src="script/script.js"></script>
</body>
</html>
